- aid: tailcall:forgecode-api
  name: ForgeCode API (Tailcall Inc)
  description: ForgeCode is the commercial CLI coding harness product from Tailcall
    Inc, positioned as an AI-enabled programming assistant supporting 300+ models
    (Claude, GPT, Grok, Gemini, Deepseek, and more). Provides ZSH integration, multi-agent
    architecture (FORGE, MUSE, SAGE sub-agents), and large codebase context engines.
