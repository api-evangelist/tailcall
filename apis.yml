aid: tailcall
name: Tailcall
description: Tailcall is a high-performance GraphQL API gateway and runtime that lets
  developers compose multiple upstream REST, gRPC, and GraphQL APIs into a unified
  GraphQL schema. Built in Rust, it offers declarative configuration via .graphql
  files with directives for HTTP, caching, batching, and security controls. The open-source
  runtime (Apache 2.0) supports deployment on AWS Lambda, Cloudflare Workers, Docker,
  and bare metal. Tailcall Inc has subsequently shipped ForgeCode, a CLI coding harness
  built on the same performance-first ethos.
