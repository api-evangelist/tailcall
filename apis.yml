apis:
- aid: tailcall:tailcall-graphql-runtime
  name: Tailcall GraphQL Runtime
  description: High-performance GraphQL runtime for composing multiple upstream REST,
    gRPC, and GraphQL APIs into a unified GraphQL schema. Configuration-driven via
    declarative .graphql files with @server, @http, @upstream, @cache, and @batch
    directives. Provides automatic N+1 detection, HTTP caching, request batching,
    and static schema validation.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
